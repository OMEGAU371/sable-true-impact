modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="omegau371"
description='''
True Impact — physics-based impact damage for Sable physical structures.
This is an unofficial add-on for Sable and is not affiliated with or endorsed by Sable's original author.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="sable"
    type="optional"
    versionRange="[1.2.2,)"
    ordering="AFTER"
    side="BOTH"
